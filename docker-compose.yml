services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: salah
      POSTGRES_PASSWORD: salah
      POSTGRES_DB: salahquad
    ports: ['5432:5432']
    volumes: ['pgdata:/var/lib/postgresql/data']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U salah']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://salah:salah@db:5432/salahquad?schema=public
      AUTH_SECRET: ${AUTH_SECRET:-change-me-in-production}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-salahquad@gmail.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Marrakech2026!}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-Salah Quad Marrakech <no-reply@salahquad.com>}
      ADMIN_NOTIFY_EMAIL: ${ADMIN_NOTIFY_EMAIL:-salahquad@gmail.com}
      NEXT_PUBLIC_WHATSAPP: ${NEXT_PUBLIC_WHATSAPP:-212660749089}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    ports: ['3000:3000']

volumes:
  pgdata:
